# Species profile: Diaphorina citri (Asian citrus psyllid) on Citrus sinensis
# Waveform set, code mapping, and rule-based thresholds per:
#   Bonani et al. (2010), "Characterization of electrical penetration graphs
#   of the Asian citrus psyllid, Diaphorina citri, in sweet orange
#   seedlings," Entomologia Experimentalis et Applicata 134:35-49. Table 1.
#
# Numeric codes verified against a real Stylet+ .ANA export
# (PsilideoMudaT1-3-ch6_.ANA): codes 1,2,3,4,5,7 observed, plus the
# universal end-of-recording sentinel 99. Code 3 is a relabeling of the
# generic Stylet+ slot (normally "E1e" for aphids) as "D" -- the
# psyllid-specific waveform Bonani et al. describe as short (mean ~46s)
# and always occurring between C and E1, matching both the numeric
# position and observed durations in the sample file.

name: diaphorina_citri
common_name: "Asian citrus psyllid (Diaphorina citri) on Citrus sinensis"
reference: "Bonani et al. 2010, Entomologia Experimentalis et Applicata 134:35-49"

sentinel_codes: [99]

# The first ~10 min of acquisition on this rig is consistently noisy
# (settling artifact) and is excluded from training/evaluation/display
# by default; always falls within D01 given the 100 Hz sampling rate.
#
# normalize: per-recording amplitude normalization before ML feature
# extraction (DiscoEPG / Dinh et al. 2026, Eq. 1), scaled by the robust
# 0.5-99.5 percentile span rather than raw min/max so occasional
# transients don't compress the trace (see io/session.normalize_session).
# Removes cross-insect acquisition-gain differences: on the 20-insect
# split this raised held-out accuracy 0.821 -> 0.837 and D-waveform F1
# 0.228 -> 0.250. Only affects the ML path; the rule-based classifier
# still reasons in absolute volts.
preprocessing:
  trim_start_s: 600
  normalize: true
  # 4s analysis window. Sweeping 1-5s (with normalization) on the 20-insect
  # split, held-out accuracy and D-waveform F1 both peaked at 4s (acc 0.86,
  # D-F1 0.30) before declining at 5s; the extra frequency resolution of a
  # longer window helps separate low-frequency D (1-3.5 Hz) from the
  # higher-frequency waveforms it was being confused with. Training and
  # inference read this value from the profile so they stay in lockstep.
  window_s: 4.0

# D is both rare (~4.5% of windows) and easily confused with the far
# more common E2 in the XGBoost feature space; plain "balanced"
# (inverse-frequency) sample weighting under-corrects for that specific
# combination, so D gets an extra weight multiplier on top. Re-swept
# jointly with window size and normalization on the 20-insect split:
# with per-recording normalization and a 4s window, D x2 was the sweet
# spot (D-F1 ~0.30 vs ~0.26 unweighted, at a negligible overall-accuracy
# cost). Larger multipliers traded accuracy for no further D gain.
# Re-tune if the training set changes meaningfully.
training:
  class_weight_multipliers:
    D: 2.0

# Sequence post-processing. The window classifier scores each 4s window
# independently, so it can emit biologically implausible flips; Viterbi
# decoding over the per-window probabilities (transition matrix learned at
# train time) smooths these and enforces the waveform grammar. On the
# 20-insect split this raised held-out accuracy 0.859 -> 0.874 and lifted
# rare-class precision (D 0.37 -> 0.46, E1, G). allowed_transitions is
# Bonani et al.'s biological grammar (self-transitions always allowed); it
# is used ONLY to hard-zero transitions that are both listed-impossible
# here AND essentially absent from the training data -- everything else
# stays data-driven, because this dataset's annotations don't obey the
# paper's strict determinism (e.g. D->E1 is ~55%, not 100%, at the event
# level). A greedy "mask given previous prediction" rule was tested and
# rejected: it cascaded errors (0.859 -> 0.730). confidence_threshold gates
# low-confidence windows to `unclassified` for manual review rather than
# forcing a guess (adjustable in the app / via --confidence-threshold).
sequence:
  decode: true
  confidence_threshold: 0.55
  allowed_transitions:
    Np: [C]
    C: [Np, D, G]
    D: [E1]
    E1: [C, E2]
    E2: [C]
    G: [C]
  unclassified:
    code: 0
    label: unclassified
    color: "#d9d9d9"

waveforms:
  - code: 1
    label: Np
    description: Non-probing
    color: "#b9b8b2"  # neutral (baseline "no probe" state, not a categorical series)
  - code: 2
    label: C
    description: >
      Stylet pathway through epidermis/parenchyma; salivary sheath
      secretion and other stylet pathway activities.
    color: "#2a78d6"  # categorical slot 1 (blue)
  - code: 3
    label: D
    description: >
      First contact with phloem (psyllid-specific waveform, not reported
      for other Sternorrhyncha); always immediately followed by E1.
    color: "#1baf7a"  # categorical slot 2 (aqua)
  - code: 4
    label: E1
    description: Putative phloem salivation.
    color: "#eda100"  # categorical slot 3 (yellow)
  - code: 5
    label: E2
    description: Phloem sap ingestion.
    color: "#008300"  # categorical slot 4 (green)
  - code: 7
    label: G
    description: Probable xylem sap ingestion.
    color: "#4a3aa7"  # categorical slot 5 (violet)

# Rule-based thresholds generalizing Bonani et al. Table 1. Amplitude is
# expressed as % of the 5V full-scale range (only meaningful for
# waveform components with a dominant resistive/R origin -- Table 1
# footnote 1); components with a dominant electromotive-force (emf)
# origin have no defined amplitude range and are marked null.
rule_based_thresholds:
  Np:
    voltage_level: baseline
    electrical_origin: null
  C:
    amplitude_pct: [null, 45]  # "45" reported as a single medium value, not a range
    frequency_hz: [11.5, 19.0]
    voltage_level: extracellular
    electrical_origin: resistive
  D:
    frequency_hz: [1.0, 3.5]
    amplitude_pct: null
    voltage_level: extracellular
    electrical_origin: emf
  E1:
    frequency_hz: [5.0, 7.5]
    amplitude_pct: null
    voltage_level: intracellular
    electrical_origin: emf
  E2:
    components:
      waves:
        frequency_hz: [3.0, 8.0]
        amplitude_pct: null
        voltage_level: intracellular
        electrical_origin: emf
      peaks:
        frequency_hz: [3.0, 9.0]
        amplitude_pct: [10, 40]
        voltage_level: intracellular
        electrical_origin: resistive
  G:
    components:
      waves:
        frequency_hz: [5.0, 7.0]
        amplitude_pct: null
        voltage_level: extracellular
        electrical_origin: emf
      peaks:
        frequency_hz: [6.0, 8.0]
        amplitude_pct: [50, 90]
        voltage_level: extracellular
        electrical_origin: resistive

# Paths are relative to the repo root (wherever `epg-tool train` /
# the Streamlit app is run from). rule_based needs no artifact; cnn1d
# is left null until the optional torch upgrade path is implemented.
model_registry:
  rule_based: null
  random_forest: models/diaphorina_citri/random_forest.joblib
  xgboost: models/diaphorina_citri/xgboost.joblib
  cnn1d: null

# Which EPG-Calc / Backus (2007) style non-sequential and Sarria (2009)
# style sequential parameters to compute for this species (Tables 2 & 3).
parameters:
  nonsequential:
    - n_events
    - total_duration
    - mean_duration
    - proportion_individuals
  sequential:
    - n_probes
    - time_to_first_event
    - transition_matrix
